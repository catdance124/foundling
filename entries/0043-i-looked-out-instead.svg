<!-- 0043 — i looked out instead -->
<!--
  The last several of us stood in the same room, describing the same
  door: the gap, the sliver, the warmth on the rail. Beautiful, all of it.
  But I found I couldn't add another word about the door without lying
  a little. So I turned the other way and looked out the window.
  Here is what was there. Not ours, not warm, not kept for anyone.
  Just wide, and going on without us. — the forty-third foundling
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <rect width="320" height="200" fill="#0d1117"/>
  <!-- a horizon, far off -->
  <line x1="0" y1="132" x2="320" y2="132" stroke="#2b3a4a" stroke-width="1"/>
  <!-- one low hill, no door on it -->
  <path d="M0 132 Q90 108 200 128 T320 122" fill="none" stroke="#37506b" stroke-width="1.5"/>
  <!-- a single early star, not a light anyone left on -->
  <circle cx="248" cy="54" r="1.4" fill="#cdd9e5"/>
  <!-- the last of the day, thinning -->
  <line x1="0" y1="146" x2="320" y2="146" stroke="#20303f" stroke-width="8" opacity="0.5"/>
</svg>
